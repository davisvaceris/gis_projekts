<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Map with Timeline & Clustering</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="../static/map.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
</head>
<body>
    <a href="/" class="back-button">← Back to Home</a>

    <div class="info-box">
        <h3 style="margin-top: 0; color: #228B22;">Planted Trees</h3>
        <p>Reporting until: <span id="current-date-display" class="date-display">-</span></p>
        <p style="margin-bottom: 0;">Visible reports: <span id="visible-count" style="font-weight: bold;">0</span></p>
    </div>

    <div id="map"></div>

    <div class="timeline-container">
        <div style="font-size: 0.9em; color: #444;">Drag slider to filter by reporting date</div>
        <input type="range" id="timeline-slider" min="0" max="100" value="100">
        <div style="display: flex; justify-content: space-between; font-size: 0.8em; color: #666; font-weight: bold;">
            <span id="start-date">-</span>
            <span id="end-date">-</span>
        </div>
    </div>

<script>
    const map = L.map('map', {
        maxZoom: 19,
        zoomControl: false // Move zoom control to avoid overlap if needed
    }).setView([50.0, 10.0], 4);

    // Add zoom control at bottom right to stay away from layers control
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const markerClusterLayer = L.markerClusterGroup({
        maxClusterRadius: 50,
        showCoverageOnHover: false,
        spiderfyOnMaxZoom: true
    }).addTo(map);

    let allData;

    const osmBase = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const satBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community'
    });

    // Corine Land Cover 2018 WMS Layer
    const corineWMS = L.tileLayer.wms("https://image.discomap.eea.europa.eu/arcgis/services/Corine/CLC2018_WM/MapServer/WMSServer", {
        layers: '1',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        attribution: "European Environment Agency (EEA)"
    });

    // Administrative Units WMS Layer from local GeoServer
    const adminUnitsWMS = L.tileLayer.wms("http://localhost:8080/geoserver/wms", {
        layers: 'koku_projekts:europe_adm_units',
        format: 'image/png',
        transparent: true,
        version: '1.1.1',
        attribution: "GeoServer"
    });

    const baseLayers = {
        "🗺️ Street Map": osmBase,
        "🛰️ Satellite Imagery": satBase
    };

    const overlayLayers = {
        "🌳 Tree Planting Reports": markerClusterLayer,
        "🏛️ Administrative Units": adminUnitsWMS,
        "🌍 Corine Land Cover 2018": corineWMS
    };

    // Initialize layer control with better design
    L.control.layers(baseLayers, overlayLayers, {
        collapsed: false,
        position: 'topleft' // Move it away from info-box
    }).addTo(map);

    function updateMap(maxTimestamp) {
        if (!allData) return;

        markerClusterLayer.clearLayers();

        const filteredFeatures = allData.features.filter(f => {
            const reportDate = new Date(f.properties.reporting_date).getTime();
            return reportDate <= maxTimestamp;
        });

        document.getElementById('visible-count').textContent = filteredFeatures.length.toLocaleString();
        document.getElementById('current-date-display').textContent = new Date(maxTimestamp).toLocaleDateString();

        const geoJsonLayer = L.geoJSON(filteredFeatures, {
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, {
                    radius: 6,
                    fillColor: "#228B22",
                    color: "#fff",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                });
            },
            onEachFeature: function (feature, layer) {
                if (feature.properties) {
                    layer.bindPopup(`
                        <div style="font-family: sans-serif;">
                            <strong style="color: #228B22;">Tree Report</strong><br>
                            <strong>Source:</strong> ${feature.properties.src}<br>
                            <strong>Planted:</strong> ${feature.properties.n} trees<br>
                            <strong>Report Date:</strong> ${new Date(feature.properties.reporting_date).toLocaleDateString()}
                        </div>
                    `);
                }
            }
        });

        markerClusterLayer.addLayer(geoJsonLayer);
    }

    fetch('/trees')
    .then(response => response.json())
    .then(data => {
        allData = data;
        if (!data.features || data.features.length === 0) return;

        const timestamps = data.features.map(f => new Date(f.properties.reporting_date).getTime());
        const minTime = Math.min(...timestamps);
        const maxTime = Math.max(...timestamps);

        const slider = document.getElementById('timeline-slider');
        slider.min = minTime;
        slider.max = maxTime;
        slider.value = maxTime;

        document.getElementById('start-date').textContent = new Date(minTime).toLocaleDateString();
        document.getElementById('end-date').textContent = new Date(maxTime).toLocaleDateString();

        slider.addEventListener('input', (e) => {
            updateMap(parseInt(e.target.value));
        });

        updateMap(maxTime);
    })
    .catch(err => console.error('Error loading tree data:', err));
</script>
</body>
</html>
