<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Project - Statistics</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        .header {
            background-color: #228B22;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-button {
            color: white;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid white;
            padding: 5px 15px;
            border-radius: 20px;
        }
        .content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: 0.3s;
        }
        .tab.active {
            color: #228B22;
            border-bottom: 3px solid #228B22;
        }
        .tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .tab-content.active {
            display: block;
        }
        #map-admin, #map-density {
            height: 500px;
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Tree Statistics</h1>
        <a href="/" class="back-button">← Back Home</a>
    </div>

    <div class="content">
        <div class="tabs">
            <div class="tab active" onclick="showTab('admin-units', this)">Trees by Country</div>
            <div class="tab" onclick="showTab('density', this)">Density by Region</div>
        </div>

        <div id="admin-units" class="tab-content active">
            <h3>Tree Planting by Administrative Units</h3>
            <p>Visualizing total trees planted based on <code>koku_projekts:europe_adm_units</code>.</p>
            <div id="map-admin"></div>
        </div>

        <div id="density" class="tab-content">
            <h3>Tree Density per Region</h3>
            <p>Visualizing planting density based on <code>koku_projekts:koku_blivums_pa_regioniem</code>.</p>
            <div id="map-density"></div>
        </div>
    </div>

    <script>
        let maps = {};

        function showTab(tabId, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            element.classList.add('active');
            document.getElementById(tabId).classList.add('active');

            // Invalidate size to fix Leaflet rendering in hidden div
            if (maps[tabId]) {
                setTimeout(() => maps[tabId].invalidateSize(), 100);
            }
        }

        function initMap(id, layerName) {
            const map = L.map(id).setView([50.0, 10.0], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Adding the WMS layer from GeoServer
            L.tileLayer.wms("http://localhost:8080/geoserver/wms", {
                layers: layerName,
                format: 'image/png',
                transparent: true,
                version: '1.1.1',
                attribution: "GeoServer"
            }).addTo(map);

            maps[id === 'map-admin' ? 'admin-units' : 'density'] = map;
        }

        // Initialize both maps
        initMap('map-admin', 'koku_projekts:europe_adm_units');
        initMap('map-density', 'koku_projekts:koku_blivums_pa_regioniem');
    </script>
</body>
</html>
