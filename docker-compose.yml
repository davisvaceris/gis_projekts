services:
  db:
    image: postgis/postgis:15-3.3
    container_name: gis_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initial_database:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4
    container_name: gis_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

  geoserver:
    image: kartoza/geoserver
    container_name: gis_geoserver
    environment:
      - POSTGRES_ADDR=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=gis_db
      - POSTGRES_USER=user
      - POSTGRES_PASS=password
      - GEOSERVER_ADMIN_USER=admin
      - GEOSERVER_ADMIN_PASSWORD=geoserver
      - GEOSERVER_DATA_DIR=/opt/geoserver/data_dir
    ports:
      - "8600:8080"
    depends_on:
      - db
    volumes:
      - geoserver_data:/opt/geoserver/data_dir

  webapp:
    build: ./webapp
    container_name: gis_webapp
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/gis_db
    depends_on:
      - db

volumes:
  postgres_data:
  geoserver_data:
